version: '3.9'

services:
  db:
    image: postgres:15
    container_name: files_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: filesdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: files_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  app:
    build: .
    container_name: files_app
    depends_on:
      - db
      - minio
    ports:
      - "8080:8080"
    environment:
      DB_URL: postgres://user:password@db:5432/filesdb
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET: files
      S3_REGION: us-east-1
    restart: unless-stopped

volumes:
  db_data:
  minio_data: